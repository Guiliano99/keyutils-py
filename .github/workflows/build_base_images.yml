# This produces the base image that contains the dependencies required for the
# keyutils-py library, including the build environment for liboqs; and the dev
# image, which is used to run code quality checks in the CI pipeline.

name: Build and push base docker images

# This is triggered whenever Docker-related changes occur, or when there are
# updates in the dependencies. It can also be started manually.
on:
  push:
    paths:
    - 'data/dockerfiles/Dockerfile.*'
    - 'pyproject.toml'
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Some contributors have names that contain upper-case characters, but
      # GHCR requires them to be lower-case, so we apply the change here
      - name: Set lowercase GitHub owner
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and push base Docker image
        run: |
          docker buildx build \
            --tag ghcr.io/${REPO_OWNER_LC}/keyutils-base:latest \
            --push \
            -f data/dockerfiles/Dockerfile.base .

      - name: Build and push dev Docker image
        run: |
          docker buildx build \
            --tag ghcr.io/${REPO_OWNER_LC}/keyutils-dev:latest \
            --build-arg BASE_IMAGE=ghcr.io/${REPO_OWNER_LC}/keyutils-base:latest \
            --push \
            -f data/dockerfiles/Dockerfile.dev .
